; -----------------------------------------------
; Custom PHP settings for apache2-php container
; -----------------------------------------------

[PHP]
; Hide PHP version from response headers (X-Powered-By)
expose_php = Off

; Memory
memory_limit = 256M

; File uploads
upload_max_filesize = 64M
post_max_size       = 64M
max_file_uploads    = 20

; Execution
max_execution_time  = 120
max_input_time      = 120
max_input_vars      = 5000

; Charset
default_charset = "UTF-8"

; Error reporting (override per environment via PHPRC or additional ini)
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /dev/stderr
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Date
date.timezone = UTC

; Session
session.cookie_secure   = On
session.cookie_httponly = On
session.cookie_samesite = Lax
session.use_strict_mode = 1

[opcache]
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer= 16
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 60
opcache.save_comments          = 1
opcache.jit_buffer_size        = 100M
opcache.jit                    = tracing

[apcu]
apc.enabled     = 1
apc.shm_size    = 32M
apc.ttl         = 7200
