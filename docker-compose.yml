# docker-compose.yml – local development helper
#
# Usage:
#   docker compose up            # HTTP-only, self-signed TLS
#   DOMAIN=example.com EMAIL=you@example.com USE_LETSENCRYPT=true docker compose up

services:
  web:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
        PHP_EXTENSIONS: ${PHP_EXTENSIONS:-bcmath curl dom exif gd gettext gmp intl mbstring mysqli opcache pcntl pdo pdo_mysql pdo_pgsql pdo_sqlite pgsql posix simplexml soap sockets xsl zip}
        PECL_EXTENSIONS: ${PECL_EXTENSIONS:-apcu redis memcached mongodb imagick swoole}
        DEV_PECL_EXTENSIONS: ${DEV_PECL_EXTENSIONS:-xdebug pcov}
    image: ghcr.io/schellevis/apache2-php:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN:           ${DOMAIN:-localhost}
      EMAIL:            ${EMAIL:-}
      USE_LETSENCRYPT:  ${USE_LETSENCRYPT:-false}
      FORCE_HTTPS:      ${FORCE_HTTPS:-false}
    volumes:
      # Application source code
      - ./www:/var/www/html
      # Persist Let's Encrypt certificates across container restarts
      - letsencrypt:/etc/letsencrypt
    restart: unless-stopped

volumes:
  letsencrypt:
