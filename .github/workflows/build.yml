name: Build and push Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    # Weekly rebuild on Sunday at 02:00 UTC to pick up base-image security patches
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      php_versions:
        description: 'Comma-separated PHP versions to build (e.g. "8.3,8.4")'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.3'
          - '8.4'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push  →  ghcr.io/…/apache2-php:main-php8.3
            type=ref,event=branch,suffix=-php${{ matrix.php-version }}
            # Tag push      →  ghcr.io/…/apache2-php:v1.2.3-php8.3
            type=semver,pattern={{version}},suffix=-php${{ matrix.php-version }}
            type=semver,pattern={{major}}.{{minor}},suffix=-php${{ matrix.php-version }}
            # Always tag    →  ghcr.io/…/apache2-php:php8.3
            type=raw,value=php${{ matrix.php-version }}
            # Mark latest PHP version as :latest
            type=raw,value=latest,enable=${{ matrix.php-version == '8.4' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php-${{ matrix.php-version }}
          cache-to:   type=gha,scope=php-${{ matrix.php-version }},mode=max
